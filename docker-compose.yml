services:
  agent:
    image: ${DOCKERHUB_USERNAME}/medilink-agent:${IMAGE_TAG:-latest}
    environment:
      - CLAUDE_MODEL=claude-3-haiku-20240307
      - AUTOREC_SERVICE_URL=http://host.docker.internal:8003
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "8004:8004"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
